<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市匹配指南 - 寻找你的归宿</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>城市匹配指南</h1>
            <p>基于 GLM-5 的性格特征与城市契合度深度分析</p>
        </header>

        <main id="app">
            <div id="quiz-form">
                <div class="card">
                    <h2>测测你最适合定居哪座城市？</h2>
                    
                    <div class="form-group">
                        <label>🍽️ 饮食口味偏好</label>
                        <div class="option-group" id="food-group">
                            <button type="button" class="option-btn active" data-value="spicy"><span class="emoji">🌶️</span>无辣不欢</button>
                            <button type="button" class="option-btn" data-value="sweet"><span class="emoji">🍬</span>清淡鲜甜</button>
                            <button type="button" class="option-btn" data-value="salty"><span class="emoji">🧂</span>咸鲜浓郁</button>
                            <button type="button" class="option-btn" data-value="diverse"><span class="emoji">🥗</span>融合多元</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>🌡️ 理想居住气候</label>
                        <div class="option-group" id="climate-group">
                            <button type="button" class="option-btn active" data-value="warm"><span class="emoji">🌸</span>四季如春</button>
                            <button type="button" class="option-btn" data-value="cold"><span class="emoji">❄️</span>喜欢下雪</button>
                            <button type="button" class="option-btn" data-value="dry"><span class="emoji">☀️</span>阳光充足</button>
                            <button type="button" class="option-btn" data-value="humid"><span class="emoji">🌧️</span>烟雨朦胧</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>⏳ 期待的生活节奏</label>
                        <div class="option-group" id="pace-group">
                            <button type="button" class="option-btn active" data-value="fast"><span class="emoji">⚡</span>效率至上</button>
                            <button type="button" class="option-btn" data-value="slow"><span class="emoji">🛶</span>安逸松弛</button>
                            <button type="button" class="option-btn" data-value="moderate"><span class="emoji">⚖️</span>平衡从容</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>🎨 核心兴趣与倾向</label>
                        <div class="option-group" id="interest-group">
                            <button type="button" class="option-btn active" data-value="tech"><span class="emoji">💻</span>科技创新</button>
                            <button type="button" class="option-btn" data-value="culture"><span class="emoji">📜</span>人文历史</button>
                            <button type="button" class="option-btn" data-value="nature"><span class="emoji">🏔️</span>自然户外</button>
                            <button type="button" class="option-btn" data-value="finance"><span class="emoji">💰</span>商业繁荣</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>✍️ 补充描述 (理想的一天)</label>
                        <textarea id="description" placeholder="例如：清晨在公园慢跑，下午在静谧的咖啡馆工作，深夜有热闹的夜市可逛..."></textarea>
                    </div>

                    <button id="submit-btn">立即生成匹配报告</button>
                </div>
            </div>

            <div id="result-container" class="hidden">
                <div class="card result-card">
                    <div id="result-content">
                        <!-- Content will be injected here -->
                    </div>
                    <button id="retry-btn">重新测试</button>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2026 城市匹配指南 | Powered by GLM-5 & Cloudflare Workers</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
